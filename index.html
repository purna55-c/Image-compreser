<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPerfect | Premium Image Compressor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-gem"></i>
            <span>Pixel<span class="text-gradient">Perfect</span></span>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
            <i class="fa-solid fa-sun"></i>
        </button>
    </nav>

    <main class="container">
        <section class="hero text-center">
            <h1>Compress Images Instantly<br>Without Losing Quality</h1>
            <p class="subtitle">Optimize your visuals with our next-generation, secure, and blazing fast local compression engine.</p>
        </section>

        <!-- Initial Upload Area -->
        <section id="upload-section" class="upload-container glass-panel">
            <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp" multiple hidden>
            <div class="upload-content">
                <div class="glow-icon">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <h2>Drop your image here or click to upload</h2>
                <p>Supports JPG, PNG, WEBP</p>
                <button class="btn btn-primary glow-btn" onclick="document.getElementById('file-input').click()">
                    Browse Files
                </button>
            </div>
        </section>

        <!-- Workspace Area -->
        <section id="workspace-section" class="workspace hidden">
            <div class="controls glass-panel">
                <h3><i class="fa-solid fa-sliders"></i> Compression Controls</h3>
                
                <div class="control-group">
                    <div class="label-row">
                        <label>Quality</label>
                        <span id="quality-display" class="highlight-value">80%</span>
                    </div>
                    <input type="range" id="quality-slider" min="1" max="100" value="80" class="gradient-slider">
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Target Size (KB)</label>
                        <span class="badge">Optional</span>
                    </div>
                    <input type="number" id="target-size" placeholder="e.g. 500" class="glass-input" min="1">
                </div>

                 <div class="control-group">
                    <div class="label-row">
                        <label>Format</label>
                    </div>
                    <select id="format-select" class="glass-input">
                        <option value="keep">Keep Original</option>
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/webp">WEBP</option>
                        <option value="image/png">PNG</option>
                    </select>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" id="reset-btn">
                        <i class="fa-solid fa-trash-can"></i> Clear All
                    </button>
                    <button class="btn btn-primary glow-btn" id="download-all-btn">
                        <i class="fa-solid fa-download"></i> Download All
                    </button>
                </div>
            </div>

            <div class="previews" id="images-container">
                <!-- Image cards generated by JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
